version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: hireflow_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hireflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hireflow_secret}
      POSTGRES_DB: ${POSTGRES_DB:-hireflow_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - hireflow_net

  redis:
    image: redis:7-alpine
    container_name: hireflow_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - hireflow_net

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: hireflow_server
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: development
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-hireflow}:${POSTGRES_PASSWORD:-hireflow_secret}@postgres:5432/${POSTGRES_DB:-hireflow_db}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-super_secret_dev_key_change_in_prod}
      JWT_EXPIRES_IN: 7d
      BCRYPT_ROUNDS: 12
    depends_on:
      - postgres
      - redis
    volumes:
      - ./server:/app
      - /app/node_modules
    networks:
      - hireflow_net

volumes:
  postgres_data:
  redis_data:

networks:
  hireflow_net:
    driver: bridge
