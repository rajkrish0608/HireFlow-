# ─────────────────────────────────────────────────────────────────────────
#  HireFlow – Coding Engine Docker Sandbox Configuration
#  Isolated containers for safe code execution.
# ─────────────────────────────────────────────────────────────────────────
#  Usage: docker compose -f docker-compose.sandbox.yml up sandbox-runner
#
#  In production: the Coding Engine service creates ephemeral containers
#  per submission using the Docker Engine SDK or a managed service (e.g.
#  Judge0, Sphere Engine, or AWS Lambda).
# ─────────────────────────────────────────────────────────────────────────

version: "3.9"

services:
  sandbox-runner:
    image: node:20-alpine
    container_name: hireflow_sandbox
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=64m
    network_mode: none # No network access
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          memory: 64M
    security_opt:
      - no-new-privileges:true # Prevent privilege escalation
    cap_drop:
      - ALL # Drop all Linux capabilities
    user: "1000:1000" # Non-root user
    working_dir: /tmp
    entrypoint: [ "sh", "-c" ]
    command: [ "echo 'Sandbox ready. Submit code via API.'" ]

  # Python sandbox
  sandbox-python:
    image: python:3.12-alpine
    container_name: hireflow_sandbox_python
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=64m
    network_mode: none
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    user: "1000:1000"
    working_dir: /tmp
    entrypoint: [ "sh", "-c" ]
    command: [ "echo 'Python sandbox ready.'" ]

  # Java sandbox
  sandbox-java:
    image: eclipse-temurin:21-jdk-alpine
    container_name: hireflow_sandbox_java
    read_only: true
    tmpfs:
      - /tmp:nosuid,size=128m
    network_mode: none
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    user: "1000:1000"
    working_dir: /tmp
    entrypoint: [ "sh", "-c" ]
    command: [ "echo 'Java sandbox ready.'" ]

  # C++ sandbox
  sandbox-cpp:
    image: gcc:13-bookworm
    container_name: hireflow_sandbox_cpp
    read_only: true
    tmpfs:
      - /tmp:nosuid,size=64m
    network_mode: none
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    user: "1000:1000"
    working_dir: /tmp
    entrypoint: [ "sh", "-c" ]
    command: [ "echo 'C++ sandbox ready.'" ]
