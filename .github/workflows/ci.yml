name: HireFlow CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"

jobs:
  # ─── Backend: Lint + Typecheck ──────────────────────────────────────────────
  server-check:
    name: Server – TypeScript & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

  # ─── Frontend: Build check ──────────────────────────────────────────────────
  client-build:
    name: Client – Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: http://localhost:4000/api

  # ─── Docker Build Validation ────────────────────────────────────────────────
  docker-validate:
    name: Docker – Compose Validate
    runs-on: ubuntu-latest
    needs: [server-check, client-build]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate docker-compose
        run: docker compose config --quiet

  # ─── Deploy (main branch only) ──────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [docker-validate]
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Replace with your actual deployment step.
      # Examples: SSH into VPS, push to AWS ECR, deploy to Railway/Render, etc.
      - name: Deployment placeholder
        run: |
          echo "✅ All checks passed on main."
          echo "Deploy target: ${{ vars.DEPLOY_TARGET || 'Not configured' }}"
          echo "To deploy: add your SSH/cloud CLI deploy command here."
